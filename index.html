<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yasin Pro v35</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root { --primary: #2ecc71; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        /* Giriş */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: #111; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 380px; border: 1px solid #333; }
        .big-input { width: 100%; padding: 18px; margin: 20px 0; border-radius: 12px; border: 2px solid #444; background: #000; color: var(--primary); font-size: 1.1rem; text-align: center; box-sizing: border-box; }

        /* Üst Bar */
        .top-bar { width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; background: #0a0a0a; border-bottom: 1px solid #222; }
        .logout-btn { background: #c0392b; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

        /* Tahta */
        .container { width: 100%; max-width: 400px; padding: 5px; box-sizing: border-box; }
        #board-wrapper { width: 100%; background: #222; border-radius: 5px; padding: 2px; }
        #board { width: 100%; }

        /* Butonlar */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 18px 5px; font-weight: bold; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .btn-h { background: #e67e22; }
        .btn-s { background: #27ae60; }
        .move-txt { font-size: 1.7rem; margin-top: 4px; font-family: monospace; }
        
        #status { font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:var(--primary); margin:0;">YASİN PRO V35</h1>
            <input type="text" id="token-input" class="big-input" placeholder="Lichess Tokeninizi Yapıştırın">
            <button class="btn btn-s" style="width: 100%;" onclick="login()">BAĞLAN</button>
        </div>
    </div>

    <div class="top-bar">
        <button class="logout-btn" onclick="logout()">ÇIKIŞ</button>
        <div id="status" style="color: var(--primary);">BAĞLANILIYOR...</div>
    </div>

    <div class="container">
        <div id="board-wrapper">
            <div id="board"></div>
        </div>
        
        <div class="controls">
            <button class="btn btn-h" onclick="applyM('h')">DÜŞÜK (D5) <span id="h-val" class="move-txt">...</span></button>
            <button class="btn btn-s" onclick="applyM('s')">YÜKSEK (D15) <span id="s-val" class="move-txt">...</span></button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let TOKEN = localStorage.getItem('yasin_v35_token');
        let gameId, myColor, board;
        const chess = new Chess();

        if (TOKEN) document.getElementById('login-screen').style.display = 'none';

        function login() {
            const val = document.getElementById('token-input').value.trim();
            if (val) { localStorage.setItem('yasin_v35_token', val); location.reload(); }
        }
        function logout() { localStorage.removeItem('yasin_v35_token'); location.reload(); }

        // STOCKFISH ONLINE API
        async function fetchSF(fen, d, id) {
            try {
                const r = await fetch(`https://stockfish.online/api/s/v2.php?fen=${fen}&depth=${d}`);
                const data = await r.json();
                if(data.success) {
                    const move = data.bestmove.split(' ')[1].toUpperCase();
                    document.getElementById(id).innerText = move;
                }
            } catch (e) {}
        }

        // HIZLANDIRILMIŞ DÖNGÜ (500ms)
        async function fastLoop() {
            if (!TOKEN) return;
            try {
                const res = await fetch("https://lichess.org/api/account/playing", { 
                    headers: {"Authorization": `Bearer ${TOKEN}`} 
                });
                const data = await res.json();
                const game = data.nowPlaying[0];

                if (!game) { 
                    $("#status").text("⏳ MAÇ YOK"); 
                    return; 
                }

                gameId = game.fullId; 
                myColor = game.color;

                // Hamle değiştiği an tetikle
                if (chess.fen() !== game.fen) {
                    chess.load(game.fen);
                    board.position(game.fen);
                    board.orientation(myColor);
                    
                    if (game.isMyTurn) {
                        $("#h-val, #s-val").text("??");
                        fetchSF(game.fen, 5, "h-val");
                        fetchSF(game.fen, 15, "s-val");
                    } else {
                        $("#h-val, #s-val").text("...");
                    }
                }
                $("#status").text(game.isMyTurn ? "🟢 SIRA SENDE" : "⚪ RAKİPTE");
            } catch (e) {}
        }

        function onDrop(source, target) {
            let move = chess.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            chess.undo();
            sendMove(source + target);
        }

        async function sendMove(m) {
            await fetch(`https://lichess.org/api/board/game/${gameId}/move/${m}`, {
                method: 'POST', headers: {"Authorization": `Bearer ${TOKEN}`}
            });
            fastLoop(); // Hamle sonrası beklemeden güncelle
        }

        function applyM(id) {
            const m = document.getElementById(id + "-val").innerText.toLowerCase();
            if (m !== "..." && m !== "??") sendMove(m);
        }

        board = Chessboard('board', {
            draggable: true, 
            position: 'start', 
            onDrop: onDrop,
            pieceTheme: 'https://lichess1.org/assets/_6P2Ivi/piece/cburnett/{piece}.svg'
        });

        // Agresif Sorgulama: 500ms (Saniyede 2 kez kontrol)
        setInterval(fastLoop, 500);
        fastLoop();
    </script>
</body>
</html>
