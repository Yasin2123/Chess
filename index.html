<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YASIN CHESS - NETLIFY PRO</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --green: #629924; --blue: #00ebff; }
        body { background: var(--bg); color: #bababa; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #game-view { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 10px; }
        #board { width: 95vw; max-width: 400px; border: 3px solid #3d3a37; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #eval-bar { width: 95vw; max-width: 400px; height: 12px; background: #444; border-radius: 6px; margin: 10px 0; overflow: hidden; border: 1px solid #555; }
        #eval-fill { height: 100%; width: 50%; background: #fff; transition: width 0.7s ease; }
        .controls { background: var(--panel); width: 95vw; max-width: 400px; padding: 20px; border-radius: 12px; box-sizing: border-box; text-align: center; }
        .move-hint { font-size: 1.8rem; font-weight: bold; color: #81b64c; margin: 10px 0; letter-spacing: 2px; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-h { background: var(--green); }
        .btn-b { background: var(--blue); color: #000; }
        #status { font-size: 0.8rem; color: #666; margin-top: 15px; }
        #login-screen { padding: 120px 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--green); letter-spacing: 3px;">YASIN CHESS V9</h1>
        <p>Netlify Bağlantısı Hazır</p>
        <button onclick="connect()" style="padding:20px 60px; background:var(--green); color:white; border:none; border-radius:50px; font-weight:bold; font-size:1.2rem; cursor:pointer; margin-top:20px;">SİSTEME BAĞLAN</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="eval-bar"><div id="eval-fill"></div></div>
        <div id="board"></div>
        <div class="controls">
            <div style="color:#888; font-size:0.8rem;">EN İYİ HAMLE</div>
            <div id="best-move" class="move-hint">...</div>
            <div class="btn-row">
                <button class="btn btn-h" onclick="play('human')">İNSANCIL</button>
                <button class="btn btn-b" onclick="play('best')">BEST MOVE</button>
            </div>
            <div id="status">Lichess Canlı Senkronizasyon Aktif</div>
        </div>
    </div>

    <script>
        const sf = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
        let board, game = new Chess(), L_TOKEN = "Lip_BCPPODoc5ycejrSU0hKT", gameId = "", myColor = "";

        async function connect() {
            try {
                const res = await fetch('https://lichess.org/api/account/playing', { 
                    headers: {'Authorization': 'Bearer ' + L_TOKEN} 
                });
                const data = await res.json();
                if(data.nowPlaying && data.nowPlaying.length > 0) {
                    gameId = data.nowPlaying[0].fullId;
                    myColor = data.nowPlaying[0].color;
                    $('#login-screen').hide();
                    $('#game-view').show();
                    init();
                } else {
                    alert("Aktif maç bulunamadı! Önce Lichess'ten bir maç başlat.");
                }
            } catch(e) { alert("Bağlantı Hatası! Tarayıcı izni veya Token sorunu."); }
        }

        function init() {
            board = Chessboard('board', {
                draggable: true, position: 'start', orientation: myColor,
                onDrop: (s, t) => {
                    let m = game.move({from: s, to: t, promotion: 'q'});
                    if(!m) return 'snapback';
                    send(m.lan);
                }
            });
            setInterval(sync, 2000);
        }

        async function sync() {
            const res = await fetch('https://lichess.org/api/board/game/stream/' + gameId.substring(0,8), {
                headers: {'Authorization': 'Bearer ' + L_TOKEN}
            });
            const reader = res.body.getReader();
            const {value} = await reader.read();
            const text = new TextDecoder().decode(value);
            const lines = text.trim().split('\n');
            lines.forEach(l => {
                try {
                    let d = JSON.parse(l);
                    let m = d.state ? d.state.moves : d.moves;
                    if(m) {
                        game.load("startpos moves " + m);
                        board.position(game.fen());
                        analyze();
                    }
                } catch(e){}
            });
        }

        function analyze() {
            sf.postMessage('position fen ' + game.fen());
            sf.postMessage('go depth 14');
            sf.onmessage = function(e) {
                if(e.data.includes('score cp')) {
                    let cp = parseInt(e.data.split('score cp ')[1].split(' ')[0]);
                    if(myColor === 'black') cp = -cp;
                    let p = Math.max(5, Math.min(95, 50 + (cp / 20)));
                    $('#eval-fill').css('width', p + '%');
                }
                if(e.data.includes('bestmove')) {
                    $('#best-move').text(e.data.split(' ')[1].toUpperCase());
                }
            };
        }

        function play(mode) {
            if(game.turn() !== myColor.charAt(0)) return;
            let m = $('#best-move').text().toLowerCase();
            let delay = mode === 'human' ? (Math.random()*4000 + 4000) : 600;
            $('#status').text("Sistem oynuyor...");
            setTimeout(() => { send(m); $('#status').text("Aktif."); }, delay);
        }

        function send(m) {
            fetch(`https://lichess.org/api/board/game/${gameId}/move/${m}`, {
                method: 'POST', headers: {'Authorization': 'Bearer ' + L_TOKEN}
            });
        }
    </script>
</body>
</html>
