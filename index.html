<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YASIN CHESS PRO V10</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #161512; --panel: #262421; --green: #629924; --blue: #00ebff; --text: #bababa; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Giriş Ekranı */
        #login-screen { padding: 80px 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .start-btn { padding: 20px 50px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .start-btn:active { transform: scale(0.95); }

        /* Oyun Alanı */
        #game-view { display: none; width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
        #board { width: 100%; border: 4px solid #3d3a37; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Eval Bar */
        #eval-container { width: 100%; height: 12px; background: #444; border-radius: 6px; margin: 15px 0; overflow: hidden; border: 1px solid #555; position: relative; }
        #eval-fill { height: 100%; width: 50%; background: #fff; transition: width 0.7s ease; }
        #eval-text { position: absolute; width: 100%; text-align: center; font-size: 10px; color: #000; font-weight: bold; line-height: 12px; }

        /* Kontrol Paneli */
        .controls { background: var(--panel); width: 100%; padding: 20px; border-radius: 12px; box-sizing: border-box; text-align: center; margin-top: 10px; }
        .move-hint { font-size: 2rem; font-weight: bold; color: var(--green); margin: 10px 0; letter-spacing: 3px; text-shadow: 0 0 10px rgba(98,153,36,0.3); }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-h { background: #388e3c; } /* İnsancıl */
        .btn-b { background: #0288d1; } /* Best */
        .btn:active { opacity: 0.8; }
        
        #status { font-size: 0.8rem; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--green); letter-spacing: 4px; margin-bottom: 10px;">YASIN CHESS PRO</h1>
        <p style="margin-bottom: 40px; color: #888;">Lichess'ten maç başlatıp butona bas.</p>
        <button class="start-btn" onclick="connectLichess()">OYUNA BAĞLAN</button>
        <p style="font-size: 0.7rem; margin-top: 30px; color: #555;">Token: Lip_BCPP...KT (Gömülü)</p>
    </div>

    <div id="game-view">
        <div id="eval-container">
            <div id="eval-text">0.0</div>
            <div id="eval-fill"></div>
        </div>
        <div id="board"></div>
        <div class="controls">
            <div style="color:#888; font-size:0.8rem; letter-spacing: 1px;">STOCKFISH ANALİZİ</div>
            <div id="best-move" class="move-hint">...</div>
            <div class="btn-row">
                <button class="btn btn-h" onclick="makeHackMove('human')">İNSANCIL</button>
                <button class="btn btn-b" onclick="makeHackMove('best')">EN İYİ (BEST)</button>
            </div>
            <div id="status">Lichess ile senkronize edildi.</div>
        </div>
    </div>

    <script>
        const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
        let board, game = new Chess(), L_TOKEN = "lip_BCPPODoc5ycejrSU0hKT", gameId = "", myColor = "";

        async function connectLichess() {
            try {
                const res = await fetch('https://lichess.org/api/account/playing', { 
                    headers: {'Authorization': 'Bearer ' + L_TOKEN} 
                });
                
                if (res.status === 401) return alert("Hata: Token yetkisi geçersiz!");
                
                const data = await res.json();
                if(data.nowPlaying && data.nowPlaying.length > 0) {
                    gameId = data.nowPlaying[0].fullId;
                    myColor = data.nowPlaying[0].color;
                    $('#login-screen').hide();
                    $('#game-view').show();
                    initBoard();
                    startSyncLoop();
                } else {
                    alert("Aktif maç bulunamadı!\n\nUnutma: Hızlı eşleşme (1+0, 3+0) yerine 'Oyun Kur' kısmından maç başlatmalısın.");
                }
            } catch(e) { 
                alert("Bağlantı Hatası! Lütfen internetini kontrol et veya tarayıcıyı yenile."); 
            }
        }

        function initBoard() {
            board = Chessboard('board', {
                draggable: true, position: 'start', orientation: myColor,
                onDrop: (s, t) => {
                    let m = game.move({from: s, to: t, promotion: 'q'});
                    if(!m) return 'snapback';
                    sendMove(m.lan);
                }
            });
        }

        function startSyncLoop() {
            // Lichess'ten hamleleri sürekli çek
            setInterval(async () => {
                try {
                    const res = await fetch('https://lichess.org/api/board/game/stream/' + gameId.substring(0,8), {
                        headers: {'Authorization': 'Bearer ' + L_TOKEN}
                    });
                    const reader = res.body.getReader();
                    const {value} = await reader.read();
                    const text = new TextDecoder().decode(value);
                    const lines = text.trim().split('\n');
                    lines.forEach(l => {
                        try {
                            let d = JSON.parse(l);
                            let moves = d.state ? d.state.moves : d.moves;
                            if(moves) {
                                game.load("startpos moves " + moves);
                                board.position(game.fen());
                                updateAnalysis();
                            }
                        } catch(e){}
                    });
                } catch(e){}
            }, 2500);
        }

        function updateAnalysis() {
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 14');
            stockfish.onmessage = function(e) {
                if(e.data.includes('score cp')) {
                    let cp = parseInt(e.data.split('score cp ')[1].split(' ')[0]);
                    if(myColor === 'black') cp = -cp;
                    $('#eval-text').text((cp/100).toFixed(1));
                    let p = Math.max(5, Math.min(95, 50 + (cp / 20)));
                    $('#eval-fill').css('width', p + '%');
                }
                if(e.data.includes('bestmove')) {
                    $('#best-move').text(e.data.split(' ')[1].toUpperCase());
                }
            };
        }

        function makeHackMove(mode) {
            if(game.turn() !== myColor.charAt(0)) return;
            let m = $('#best-move').text().toLowerCase();
            if(m === "...") return;
            
            let delay = mode === 'human' ? (Math.random()*4000 + 4500) : 600;
            $('#status').text("Sistem oynuyor (" + mode + ")...");
            setTimeout(() => { 
                sendMove(m); 
                $('#status').text("Senkronize."); 
            }, delay);
        }

        function sendMove(m) {
            fetch(`https://lichess.org/api/board/game/${gameId}/move/${m}`, {
                method: 'POST', headers: {'Authorization': 'Bearer ' + L_TOKEN}
            });
        }
    </script>
</body>
</html>
